name: Generate Doxygen Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/*'
    paths:
      - 'src/**'
      - 'include/**'
      - 'Doxyfile'

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate documentation
        run: |
          doxygen Doxyfile

      - name: Verify documentation output
        run: |
          if [ ! -d "doc/generated/html" ] || [ ! -f "doc/generated/html/index.html" ]; then
            echo "Error: Documentation generation failed"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to gh-pages
        run: |
          # Fetch gh-pages if it exists
          git fetch origin gh-pages || true

          # Create or switch to gh-pages
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          # Clean old docs
          rm -rf docs
          mkdir -p docs

          # Copy new docs
          cp -r doc/generated/html/* docs/

          git add docs

          # Skip if nothing changed (including new files)
          if git diff --cached --quiet; then
            echo "No documentation changes detected. Skipping publish."
            exit 0
          fi

          git commit -m "Update Doxygen documentation"
          git push origin gh-pages
